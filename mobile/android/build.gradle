allprojects {
    repositories {
        google()
        mavenCentral()
    }

    // Compatibility shim for older Flutter plugins that still read
    // flutter.compileSdkVersion/minSdkVersion/targetSdkVersion from Gradle.
    if (!project.hasProperty("flutter")) {
        project.ext.flutter = [
            compileSdkVersion: 35,
            minSdkVersion    : 21,
            targetSdkVersion : 35,
        ]
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
